services:
  db:
    image: mariadb:11.8
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wp
      MARIADB_PASSWORD: wp
      MARIADB_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      retries: 20

  wordpress:
    build:
      context: .
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_URL: ${WORDPRESS_URL:-http://localhost}
      WORDPRESS_OPTIONAL_PLUGIN: ${WORDPRESS_OPTIONAL_PLUGIN:-none}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER:-admin_qmpgfd}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD:-R40U8zp17YlwvQNkDEKgnhx2!@#}
      WORDPRESS_ADMIN_PASSWORD_BASE64: ${WORDPRESS_ADMIN_PASSWORD_BASE64:-}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL:-admin@example.com}
    ports:
      - "127.0.0.1:${WORDPRESS_PORT:-80}:80"
    volumes:
      - wp_data:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./scripts:/scripts:ro
      - ./scripts/wordpress-admin-guardian.ini:/usr/local/etc/php/conf.d/wordpress-admin-guardian.ini:ro
      - ./plugins:/plugins:ro
      - ./manual:/manual:ro
      - ./snapshots:/snapshots
    entrypoint: ["/scripts/entrypoint.sh"]
    command: ["apache2-foreground"]

  mailpit:
    image: axllent/mailpit:v1.30.0
    ports:
      - "127.0.0.1:${MAILPIT_PORT:-8025}:8025"

  phpmyadmin:
    image: phpmyadmin:5.2.2
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_USER: wp
      PMA_PASSWORD: wp
      UPLOAD_LIMIT: 256M
    ports:
      - "127.0.0.1:${PHPMYADMIN_PORT:-8080}:80"

volumes:
  db_data:
  wp_data:
